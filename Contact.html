<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="utf-8">
    <title>Contact me </title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
        rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
        crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.2/font/bootstrap-icons.css">
    <style>
        body,form{background-color:#000;color:#fff}.btn,.qdetails,body,form{color:#fff}footer{height:130px;width:40%}#container{display:flex;flex-wrap:wrap}h1{text-shadow:2px 2px 2px gray}form{margin:10px 20px;padding:20px;width:90%;height:600px}dd{margin:20px}sup{color:red;font-weight:700}.qdetails{margin-top:30px}.details{width:115px;height:40px}.mindetails{height:30px;width:40px}.fulldetails{width:233px;height:40px}.btn{width:100px;height:40px;margin-top:50px;border-radius:10px}#socialmedia{text-align:center;width:100%;height:250px;color:#fff;margin-left:100px}#socialmedia button{border-radius:20px;margin:10px}#socialmedia p{margin-top:20px}.bi:hover{color:gold}   
    </style>
</head>
<body>
    <div id="Contact">
        <h1>Contact me </h1>
        <section>
            <form autocomplete="on" action="mailto:syedfahad1237@gmail.com" method="post">
                <div id="container">
                    <div class="question">
                        <dl>
                            <dd class="qdetails">
                                Full Name <sup>*</sup>
                            </dd>
                            <dd class="qdetails">
                                Phone no <sup>*</sup>
                            <dd class="qdetails">
                                E-mail <sup>*</sup>
                            </dd>
                            <dd class="qdetails">
                                Address
                            </dd>
                            <dd class="qdetails">
                                Message
                            </dd>
                        </dl>
                    </div>
                    <div class="answers">
                        <dl>
                            <dd>
                                <input class="details" type="text" name="firstname" required autofocus
                                    placeholder="first name">

                                <span>
                                    <input class="details" type="text" name="lastname" required placeholder="last name">
                                </span>
                            </dd>
                            <dd>

                                <select class="mindetails">
                                    <option value="India">91+</option>
                                    <option value="Austrailia"> 61+</option>
                                    <option value="China">86+</option>
                                    <option value="Afghanistan">93+</option>
                                </select>

                                <span>
                                    <input type="tel" name="mobileno" placeholder="9876543210">
                                </span>
                            </dd>
                            <dd>
                                <input class="fulldetails" type="email" name="mailid" required>

                            </dd>
                            <dd>
                                <input class="fulldetails" type="text" name="address" id="">
                            </dd>
                            <dd>
                                <textarea name="message" cols="28" rows="5"></textarea>
                            </dd>
                        </dl>
                        <button class="btn btn-secondary">submit</button>
                    </div>
                </div>
            </form>
        </section>
        <footer>
            <div id="socialmedia">
                <span>
                    <a href="https://www.facebook.com/syedfahad1215"><button class="bi bi-facebook"></button></a>
                </span>
                <span>
                    <a href="https://www.instagram.com/p/ByZJag2JJjH9WuIhaGTgLYbALSD37ZfZu-jSBU0/?igshid=N2Y5NTAwYTk="><button class="bi bi-instagram"></button></a>
                </span>
                <span>
                    <a href="https://twitter.com/Syedfah41223271?t=oegl7omdM_ufWIDBLr2smA&s=09"><button class="bi bi-twitter"></button></a>
                </span>
                <span>
                    <a href="https://www.linkedin.com/in/syed-fahad-467412226"><button class="bi bi-linkedin"></button></a>
                </span>
                <p class="footer-para">© Copyright </p>
            </div>
        </footer>
    </div>
